apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api
  namespace: argocd 
spec:
  project: default
  source:
    repoURL: https://github.com/datpn02/mini_gitops.git 
    targetRevision: main
    path: k8s-api 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true