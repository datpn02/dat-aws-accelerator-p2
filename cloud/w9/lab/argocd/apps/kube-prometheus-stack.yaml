apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: kube-prometheus-stack
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.1.1

    helm:
      values: |
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false

        grafana:
          adminPassword: admin123

        alertmanager:
          config:
            global:
              smtp_smarthost: 'smtp.gmail.com:587'
              smtp_from: 'w.pnguyendat@gmail.com'
              smtp_auth_username: 'w.pnguyendat@gmail.com'
              smtp_auth_password: '/etc/alertmanager/secrets/alertmanager-smtp-secret/password'
            receivers:
            - name: email
              email_configs:
              - to: 'w.pnguyendat@gmail.com'
            route:
              receiver: email

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

